services:
  app:
    image: ${IMAGE_NAME:-ghcr.io/neg1t/photo}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - /opt/photo/shared/env/.env.production
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
    command: ["pnpm", "start"]
    ports:
      - "127.0.0.1:3000:3000"

  worker:
    image: ${IMAGE_NAME:-ghcr.io/neg1t/photo}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - /opt/photo/shared/env/.env.production
    environment:
      NODE_ENV: production
      WORKER_POLL_INTERVAL_MS: ${WORKER_POLL_INTERVAL_MS:-5000}
    command: ["pnpm", "worker"]
