name: Deploy

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ghcr.io/neg1t/photo

jobs:
  test-build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: Run tests
        run: pnpm exec vitest run

      - name: Run lint
        run: pnpm lint

      - name: Build application
        run: pnpm build

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push production image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Sync deploy files to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh -p "$VPS_PORT" -o StrictHostKeyChecking=accept-new "$VPS_USER@$VPS_HOST" "mkdir -p /opt/photo/current/scripts/deploy /opt/photo/current/deploy/nginx"
          export RSYNC_RSH="ssh -p $VPS_PORT -o StrictHostKeyChecking=accept-new"
          rsync -az --delete docker-compose.prod.yml "$VPS_USER@$VPS_HOST:/opt/photo/current/"
          rsync -az --delete scripts/deploy/ "$VPS_USER@$VPS_HOST:/opt/photo/current/scripts/deploy/"
          rsync -az --delete deploy/nginx/ "$VPS_USER@$VPS_HOST:/opt/photo/current/deploy/nginx/"

      - name: Run remote deploy
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh -p "$VPS_PORT" -o StrictHostKeyChecking=accept-new "$VPS_USER@$VPS_HOST" \
            "chmod +x /opt/photo/current/scripts/deploy/*.sh && export IMAGE_NAME=${IMAGE_NAME} IMAGE_TAG=${GITHUB_SHA} && /opt/photo/current/scripts/deploy/deploy.sh"
